<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flamingo Revolution</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    :root {
      --flamingo: #fb6f92;
      --flamingo-deep: #c9184a;
      --bg: #fff0f3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 50% 15%, #ffffff 0%, var(--bg) 70%);
      color: #4a3036;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 3rem 1.5rem;
    }

    .flamingo {
      width: 130px;
      height: auto;
      filter: drop-shadow(0 12px 20px rgba(201, 24, 74, 0.25));
      animation: bob 3s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%      { transform: translateY(-12px) rotate(2deg); }
    }

    h1 {
      margin-top: 1rem;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--flamingo-deep);
    }
    .tagline {
      margin-top: 0.5rem;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #6b4a52;
      max-width: 42ch;
    }

    /* === SOCIAL LINKS = the main event === */
    .socials {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      font-size: 1.15rem;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .social-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }
    .social-btn svg { width: 28px; height: 28px; fill: #fff; flex-shrink: 0; }
    .social-btn span { flex: 1; text-align: left; }

    .instagram { background: linear-gradient(45deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5); }
    .facebook  { background: #1877f2; }
    .tiktok    { background: #010101; }

    /* === Pictures: now at the bottom === */
    .gallery-title {
      margin-top: 3.5rem;
      font-size: 1.1rem;
      color: var(--flamingo-deep);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.25rem;
      max-width: 760px;
    }
    .gallery img {
      width: 220px; height: 160px;
      object-fit: cover; border-radius: 14px;
      box-shadow: 0 8px 18px rgba(201, 24, 74, 0.15);
    }
    .gallery .placeholder {
      width: 220px; height: 160px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      background: #ffd9e0; color: #c9184a; font-size: 0.9rem;
      border: 2px dashed #fb6f92;
    }

    footer { margin-top: auto; padding-top: 3rem; font-size: 0.85rem; color: #b08a92; }
  </style>
</head>
<body>
  <!-- Flamingo mascot (also used as the browser-tab logo / favicon) -->
  <svg class="flamingo" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flamingo">
    <line x1="92" y1="170" x2="86" y2="250" stroke="#f48fb1" stroke-width="6" stroke-linecap="round"/>
    <line x1="108" y1="170" x2="118" y2="250" stroke="#f48fb1" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="100" cy="150" rx="50" ry="40" fill="#fb6f92"/>
    <path d="M140 140 q35 -5 50 15 q-30 5 -50 0 z" fill="#fb6f92"/>
    <path d="M70 140 q-20 -60 25 -90 q15 -10 25 0 q-30 5 -35 35 q-5 35 0 60 z" fill="#fb6f92"/>
    <circle cx="118" cy="48" r="18" fill="#fb6f92"/>
    <circle cx="124" cy="44" r="3" fill="#3a1f24"/>
    <path d="M132 50 l24 8 l-22 8 q-6 -8 -2 -16 z" fill="#3a1f24"/>
  </svg>

  <h1>Flamingo Revolution</h1>
  <p class="tagline">Follow us and join the flock. 🦩 Connect with us on social media below.</p>

      <span>TikTok</span>
    </a>
  </nav>

  <!-- PICTURES — moved to the bottom.
       Put image files in this folder, then replace a placeholder with:
       <img src="your-photo.jpg" alt="description" /> -->
  <h2 class="gallery-title">Gallery</h2>
  <div class="gallery">
    <div class="placeholder">Photo 1 goes here</div>
    <div class="placeholder">Photo 2 goes here</div>
    <div class="placeholder">Photo 3 goes here</div>
  </div>

  <footer>© <span id="year"></span> Flamingo Revolution</footer>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
